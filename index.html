<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELITH | Premium Mineral Washbasins</title>

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:#070707;color:#f2eadf;font-family:Arial,Helvetica,sans-serif}
a{text-decoration:none;color:inherit}

/* NAV */
nav{
position:sticky;top:0;z-index:99;
padding:14px 5%;
display:flex;align-items:center;justify-content:space-between;gap:20px;
background:rgba(7,7,7,.94);
border-bottom:1px solid #2b2722;
backdrop-filter:blur(12px)
}
.logo{font-size:30px;letter-spacing:10px;font-weight:800}
.menu{display:flex;gap:18px;flex-wrap:wrap}
.menu a{font-size:13px;padding:10px 12px}
.menu .goldbtn{border:1px solid #c8a25f;color:#e7c98d}

/* HERO */
.hero{
padding:70px 5%;
display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;
}
h1{font-size:60px;line-height:1.05;margin:0 0 20px}
.hero p{font-size:18px;color:#ded5c9}
.gold{color:#c8a25f;font-weight:700}
.btn{display:inline-block;margin-top:20px;border:1px solid #c8a25f;padding:12px 22px;color:#c8a25f}

/* IMAGE */
.hero img{
width:100%;
border:1px solid #2c2822;
}

/* SECTION */
.section{padding:60px 5%}
h2{font-size:34px;margin-bottom:20px}

/* PRODUCT */
.catalog{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
}
.card{
background:#111;
border:1px solid #2d2924;
}
.card img{
width:100%;
height:180px;
object-fit:cover;
}
.card .text{padding:14px}

/* CTA */
.cta{
padding:40px 5%;
display:grid;
grid-template-columns:1fr 250px;
gap:20px;
align-items:center;
background:#0d0d0d;
}
.contact{
background:#c8a25f;
color:#fff;
text-align:center;
padding:14px;
font-weight:bold;
}

/* MOBILE */
@media(max-width:900px){

.hero{grid-template-columns:1fr}
h1{font-size:30px}
h2{font-size:24px}

.catalog{grid-template-columns:1fr}

}
</style>
</head>

<body>

<nav>
<div class="logo">VELITH</div>
<div class="menu">
<a href="#">HOME</a>
<a href="#">PRODUCT</a>
<a href="#">TECHNOLOGY</a>
<a class="goldbtn" href="#">CONTACT</a>
</div>
</nav>

<header class="hero">
<div>
<h1>ENGINEERED TO ELEVATE</h1>
<p>VELITH is a high-performance mineral composite system for premium washbasins.</p>
<a class="btn" href="#">REQUEST INFO</a>
</div>

<img src="https://images.unsplash.com/photo-1582582621959-48d27397dc69?q=80&w=1400">
</header>

<section class="section">
<h2>WASHBASINS</h2>

<div class="catalog">
<div class="card">
<img src="https://images.unsplash.com/photo-1600566753086-00f18fb6b3ea?q=80&w=800">
<div class="text">RECTA</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1595514535415-dae2c1e3a9d6?q=80&w=800">
<div class="text">CIRCA</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=800">
<div class="text">OVALA</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1564540586988-aa4e53c3d799?q=80&w=800">
<div class="text">QUADRA</div>
</div>
</div>

</section>

<section class="cta">
<div>
<h2>LET’S BUILD SOMETHING EXCEPTIONAL</h2>
<p>Contact us for OEM and collaboration.</p>
</div>
<a class="contact" href="#">CONTACT US</a>
</section>

</body>
</html>
