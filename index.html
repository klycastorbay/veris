<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELITH</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#070707;color:#f2eadf;font-family:Arial}
a{text-decoration:none;color:inherit}

/* NAV */
nav{
position:sticky;top:0;
padding:16px 5%;
background:#070707;
border-bottom:1px solid #2b2722;
}
.logo{font-size:28px;letter-spacing:8px;font-weight:bold}
.menu{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.menu a{font-size:12px;padding:8px 10px;border:1px solid #333}
.gold{border:1px solid #c8a25f;color:#c8a25f}

/* HERO */
.hero{
padding:60px 5%;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
align-items:center;
}
h1{font-size:56px;margin:0}
.hero p{color:#ccc}

.hero img{
width:100%;
border:1px solid #333;
}

/* SECTION */
.section{padding:50px 5%}
h2{font-size:32px}
p{color:#bbb}

/* PRODUCT */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:#111;
border:1px solid #333;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card div{padding:12px}

/* MOBILE */
@media(max-width:900px){

.hero{
grid-template-columns:1fr;
}

h1{font-size:30px}
h2{font-size:24px}

.grid{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<nav>
<div class="logo">VELITH</div>
<div class="menu">
<a>HOME</a>
<a>PRODUCT</a>
<a>TECH</a>
<a class="gold">CONTACT</a>
</div>
</nav>

<div class="hero">
<div>
<h1>ENGINEERED TO ELEVATE</h1>
<p>Premium mineral washbasin system</p>
</div>

<img src="https://images.unsplash.com/photo-1582582621959-48d27397dc69?q=80&w=1400">
</div>

<div class="section">
<h2>WASHBASINS</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1600566753086-00f18fb6b3ea?q=80&w=800">
<div>RECTA</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1595514535415-dae2c1e3a9d6?q=80&w=800">
<div>CIRCA</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=800">
<div>OVALA</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1564540586988-aa4e53c3d799?q=80&w=800">
<div>QUADRA</div>
</div>

</div>
</div>

<div class="section">
<h2>CONTACT</h2>
<p>your@email.com</p>
</div>

</body>
</html>
