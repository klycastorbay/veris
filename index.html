<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELITH | Premium Mineral Washbasins</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#070707;color:#f2eadf;font-family:Arial}
a{text-decoration:none;color:inherit}

nav{
position:sticky;top:0;
padding:14px 5%;
background:#070707;
border-bottom:1px solid #2b2722;
}

.logo{font-size:26px;letter-spacing:8px;font-weight:bold}
.menu{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.menu a{font-size:12px;padding:8px 10px;border:1px solid #333}
.gold{border:1px solid #c8a25f;color:#c8a25f}

/* HERO */
.hero{
padding:50px 5%;
text-align:center;
}

.hero img{
width:100%;
max-height:400px;
object-fit:cover;
margin-top:20px;
border:1px solid #333;
}

/* SECTION */
.section{padding:40px 5%}
h1{font-size:48px}
h2{font-size:30px}
p{color:#ccc}

/* PRODUCT */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.card{
background:#111;
border:1px solid #333;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card div{padding:10px}

/* MOBILE */
@media(max-width:900px){

h1{font-size:28px}
h2{font-size:22px}

.grid{grid-template-columns:1fr}

}
</style>
</head>

<body>

<nav>
<div class="logo">VELITH</div>
<div class="menu">
<a>HOME</a>
<a>PRODUCT</a>
<a>TECH</a>
<a class="gold">CONTACT</a>
</div>
</nav>

<div class="hero">
<h1>ENGINEERED TO ELEVATE</h1>
<p>Premium mineral washbasin system</p>

<img src="https://images.unsplash.com/photo-1582582621959-48d27397dc69?q=80&w=1400" />
</div>

<div class="section">
<h2>WASHBASINS</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1600566753086-00f18fb6b3ea?q=80&w=800"/>
<div>RECTA</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1595514535415-dae2c1e3a9d6?q=80&w=800"/>
<div>CIRCA</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=800"/>
<div>OVALA</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1564540586988-aa4e53c3d799?q=80&w=800"/>
<div>QUADRA</div>
</div>

</div>
</div>

<div class="section">
<h2>CONTACT</h2>
<p>your@email.com</p>
</div>

</body>
</html>
