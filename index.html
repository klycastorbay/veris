<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELITH</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}

/* NAV */
nav{
position:sticky;top:0;
background:#000;
padding:15px;
border-bottom:1px solid #333;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:5px;
margin-bottom:10px;
}

.nav{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.nav a{
font-size:12px;
padding:8px 10px;
border:1px solid #333;
}

.btn{
border:1px solid #c8a25f;
color:#c8a25f;
}

/* HERO */
.hero{
padding:40px 20px;
text-align:center;
}

.hero-box{
height:250px;
background:linear-gradient(#333,#111);
margin-top:20px;
border-radius:10px;
}

/* PRODUCT */
.section{
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#111;
padding:10px;
}

.img{
height:120px;
background:linear-gradient(#555,#222);
margin-bottom:10px;
}

@media(max-width:600px){
.grid{grid-template-columns:1fr}
}
</style>

</head>

<body>

<nav>
<div class="logo">VELITH</div>
<div class="nav">
<a href="#">HOME</a>
<a href="#">PRODUCT</a>
<a href="#">TECH</a>
<a href="#" class="btn">CONTACT</a>
</div>
</nav>

<div class="hero">
<h1>ENGINEERED TO ELEVATE</h1>
<p>Premium mineral washbasin system</p>
<div class="hero-box"></div>
</div>

<div class="section">
<h2>PRODUCTS</h2>

<div class="grid">

<div class="card">
<div class="img"></div>
RECTA
</div>

<div class="card">
<div class="img"></div>
CIRCA
</div>

<div class="card">
<div class="img"></div>
OVALA
</div>

<div class="card">
<div class="img"></div>
QUADRA
</div>

</div>
</div>

<div class="section">
<h2>CONTACT</h2>
<p>Email: your@email.com</p>
</div>

</body>
</html>
